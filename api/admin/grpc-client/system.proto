// 声明 proto 使用的语法版本
syntax = "proto3";

// proto 包名
package system;

// golang 包名
option go_package = "./system";

message GetRuleListRequest {}
message RuleListData{
  string component = 1;
  string create_time = 2;
  string icon = 3;
  uint64 id = 4;
  string locale = 5;
  string path = 6;
  string permission = 7;
  uint64 pid = 8;
  string spacer = 9;
  uint64 status = 10;
  string title = 11;
  uint64 type = 12;
  uint64 weigh = 13;
  repeated RuleListData children = 14;
}
message GetRuleListResponse {
  repeated RuleListData data = 1;
}
message SaveRuleRequest{
  uint64 activemenu = 1;
  string component = 2;
  string des = 3;
  uint64 hidechildreninmenu = 4;
  uint64 hideinmenu = 5;
  string icon = 6;
  uint64 id = 7;
  uint64 isext = 8;
  uint64 keepalive = 9;
  string locale = 10;
  uint64 noaffix = 11;
  uint64 onlypage = 12;
  string path = 13;
  string permission = 14;
  uint64 pid = 15;
  string redirect = 16;
  uint64 requiresauth = 17;
  string routename = 18;
  string routepath = 19;
  string title = 20;
  uint64 type = 21;
  uint64 weigh = 22;
}
message SaveRuleResponse{
  uint64 id = 1;
}
message UpStatusRuleRequest{
  uint64 id = 1;
  uint64 status = 2;
}
message UpStatusRuleResponse{
}
message DelRuleRequest{
  uint64 id = 1;
}
message DelRuleResponse{

}
message GetRuleContentRequest{
  uint64 id = 1;
}
message GetRuleContentResponse{
  uint64 activemenu = 1;
  string component = 2;
  string des = 3;
  uint64 hidechildreninmenu = 4;
  uint64 hideinmenu = 5;
  string icon = 6;
  uint64 id = 7;
  uint64 isext = 8;
  uint64 keepalive = 9;
  string locale = 10;
  uint64 noaffix = 11;
  uint64 onlypage = 12;
  string path = 13;
  string permission = 14;
  uint64 pid = 15;
  string redirect = 16;
  uint64 requiresauth = 17;
  string routename = 18;
  string routepath = 19;
  string title = 20;
  uint64 type = 21;
  uint64 weigh = 22;
  string create_time = 23;
  uint64 status = 24;
  uint64 uid = 25;
}
message GetRuleParentRequest{
  uint64 id = 1;
}
message GetRuleParentResponse{
  string data = 1;
}
message GetRoutesRequest{
}
message GetRoutesResponse{
  string data = 1;
}
// 定义服务
service RuleService {
  rpc GetList(GetRuleListRequest) returns (GetRuleListResponse);
  rpc Save(SaveRuleRequest) returns (SaveRuleResponse);
  rpc UpStatus(UpStatusRuleRequest) returns (UpStatusRuleResponse);
  rpc Del(DelRuleRequest) returns (DelRuleResponse);
  rpc GetContent(GetRuleContentRequest) returns (GetRuleContentResponse);
  rpc GetParent(GetRuleParentRequest) returns (GetRuleParentResponse);
  rpc GetRoutes(GetRoutesRequest) returns (GetRoutesResponse);
}
// 获取部门列表请求
message GetDeptListRequest {
  uint64 business_id = 1;
  string name = 2;
  uint64 status = 3;
  string create_time = 4;
}
message DeptData{
  uint64 id = 1;
  uint64 account_id = 2;
  string name = 3;
  uint64 status = 4;
  string create_time = 5;
  uint64 business_id = 6;
  uint64 pid = 7;
  string remark = 8;
  string spacer = 9;
  uint64 weigh = 10;
  repeated DeptData children = 11;
}
message GetDeptListResponse {
  repeated DeptData data = 1;
}
message SaveDeptRequest{
  uint64 id = 1;
  uint64 account_id = 2;
  string name = 3;
  uint64 business_id = 4;
  uint64 pid = 5;
  string remark = 6;
  uint64 weigh = 7;
}
message SaveDeptResponse{
  uint64 id = 1;
}
message UpStatusDeptRequest{
  uint64 id = 1;
  uint64 status = 2;
}
message UpStatusDeptResponse{

}
message DelDeptRequest{
  uint64 id = 1;
}
message DelDeptResponse{

}
message GetDeptParentRequest{
  uint64 business_id = 1;
}
message DeptParentData{
  uint64 id = 1;
  string name = 2;
  uint64  pid = 3;
  repeated DeptParentData children = 4;
}
message GetDeptParentResponse{
  repeated DeptParentData data = 1;
}
// 定义服务
service DeptService {
  rpc GetList(GetDeptListRequest) returns (GetDeptListResponse);
  rpc Save(SaveDeptRequest) returns (SaveDeptResponse);
  rpc UpState(UpStatusDeptRequest) returns (UpStatusDeptResponse);
  rpc Del(DelDeptRequest) returns (DelDeptResponse);
  rpc GetParent(GetDeptParentRequest) returns (GetDeptParentResponse);
}
// 获取登录请求
message GetRoleListRequest {
  uint64 user_id = 1;
  string name = 2;
  uint64 status = 3;
  string create_time = 4;
  string request_url = 5;
}
message RoleData{
  uint64 account_id = 1;
  string btns = 2;
  uint64 business_id = 3;
  string create_time = 4;
  uint64 data_access = 5;
  uint64 id = 6;
  string menu = 7;
  string name = 8;
  uint64 pid = 9;
  string remark = 10;
  string rules = 11;
  string spacer = 12;
  uint64 status = 13;
  uint64 weigh = 14;
  repeated RoleData children = 15;
}
message GetRoleListResponse {
  uint64 max_pid = 1;
  repeated RoleData list = 2;
}

message SaveRoleRequest{
  uint64 account_id = 1;
  repeated uint64 btns = 2;
  uint64 business_id = 3;
  uint64 data_access = 4;
  uint64 id = 5;
  repeated string menu = 6;
  string name = 7;
  uint64 pid = 8;
  string remark = 9;
  string rules = 10;
  uint64 status = 11;
  uint64 weigh = 12;
}
message SaveRoleResponse{
  uint64 id = 1;
}
message UpStatusRoleRequest{
  uint64 id = 1;
  uint64 status = 2;
}
message UpStatusRoleResponse{

}
message DelRoleRequest{
  uint64 id = 1;
}
message DelRoleResponse{

}
message GetRoleParentRequest{
  uint64 id = 1;
  string request_url = 2;
  uint64 user_id = 3;
}
message GetRoleParentResponse{
  repeated RoleData list = 1;
}
message GetMenuListRequest{
  uint64 pid = 1;
  uint64 user_id = 2;
}
message GetMenuListResponse{
  string data = 1;
}
// 定义服务
service RoleService {
  rpc GetList(GetRoleListRequest) returns (GetRoleListResponse);
  rpc Save(SaveRoleRequest) returns (SaveRoleResponse);
  rpc UpStatus(UpStatusRoleRequest) returns (UpStatusRoleResponse);
  rpc Del(DelRoleRequest) returns (DelRoleResponse);
  rpc GetParent(GetRoleParentRequest) returns (GetRoleParentResponse);
  rpc GetMenuList(GetMenuListRequest) returns (GetMenuListResponse);
}
// 获取账号列表请求
message GetAccountListRequest {
  string name = 1;
  uint64 status = 2;
  string create_time = 3;
  uint64 business_id = 4;
  uint64 page = 5;
  uint64 page_size = 6;
  uint64 user_id = 7;
}
message AccountData{
  uint64 id = 1;
  string address = 2;
  string avatar = 3;
  string city = 4;
  string company = 5;
  string deptname = 6;
  string create_time = 7;
  uint64 dept_id = 8;
  string email = 9;
  string mobile = 10;
  string name = 11;
  string remark = 12;
  uint64 status = 13;
  string tel = 14;
  string username = 15;
  repeated uint64 roleid = 16;
  repeated string rolename = 17;
}
// 获取账号列表响应
message GetAccountListResponse {
  repeated AccountData items = 1;//返回数据有值无值时不省略字段
  uint64 page = 2;
  uint64 pageSize = 3;
  uint64 total = 4;
}
message SaveAccountRequest{
  uint64 id = 1;
  string address = 2;
  string avatar = 3;
  string city = 4;
  string company = 5;
  string deptname = 6;
  string create_time = 7;
  uint64 dept_id = 8;
  string email = 9;
  string mobile = 10;
  string name = 11;
  string remark = 12;
  uint64 status = 13;
  string tel = 14;
  string username = 15;
  repeated uint64 roleid = 16;
  repeated string rolename = 17;
  string password = 18;
  uint64 account_id = 19;
  uint64 business_id = 20;
}
message SaveAccountResponse{
  uint64 id = 1;
}
message UpStatusAccountRequest{
  uint64 id = 1;
  uint64 status = 2;
}
message UpStatusAccountResponse{
}
message DelAccountRequest{
  uint64 id = 1;
}
message DelAccountResponse{}
message GetAccountRoleRequest{
  uint64 user_id = 1;
}

message GetAccountRoleResponse{
  repeated RoleData list = 1;
}
message IsAccountExistRequest{
  uint64 id = 1;
  string username = 2;
}
message IsAccountExistResponse{
}
// 定义服务
service AccountService {
  rpc GetList(GetAccountListRequest) returns (GetAccountListResponse);
  rpc Save(SaveAccountRequest) returns (SaveAccountResponse);
  rpc UpState(UpStatusAccountRequest) returns (UpStatusAccountResponse);
  rpc Del(DelAccountRequest) returns (DelAccountResponse);
  rpc GetRole(GetAccountRoleRequest) returns (GetAccountRoleResponse);
  rpc Isaccountexist(IsAccountExistRequest) returns (IsAccountExistResponse);
}


// 获取登录日志请求
message GetLogListRequest {
  uint64 page = 1;
  uint64 page_size = 2;
  uint64 business_id = 3;
  string ip = 4;
  string user = 5;
  uint64 status = 6;
  string create_time = 7;
}
message GetLogData{
  uint64 id = 1;
  uint64 account_id = 2;
  uint64 business_id = 3;
  string type = 4;
  uint64 status = 5;
  string des = 6;
  string ip = 7;
  string address = 8;
  string user_agent = 9;
  string error_msg = 10;
  string created_time = 11;
  uint64 uid = 12;
  map<string, string> user = 13;
}
//获取登录日志
message GetLogListResponse {
  repeated GetLogData items = 1;//返回数据有值无值时不省略字段
  uint64 page = 2;
  uint64 pageSize = 3;
  uint64 total = 4;
}
message DelLastLoginRequest{
}
message DelLastLoginResponse{
}
message GetOperationRequest{
  string user_name = 1;         // 操作人
  string ip = 2;             // IP或地址
  uint32 status = 3;          // 状态(可选)
  string create_time = 4;      // 时间查询
  uint64 page = 5;           // 页码
  uint64 size = 6;      // 每页数量
  uint64 user_id = 7;
  uint64 business_id = 8;
}
message UserInfo {
  string name = 1;
  string username = 2;
  string avatar = 3;
  string nickname = 4;
}
message OperationLogData {
  uint64 id = 1;              // 日志ID
  uint64 user_id = 2;        // 用户ID
  uint64 account_id = 3;     // 账号ID
  uint64 business_id = 4;     // 业务ID
  string type = 5;           // 日志类型
  string method = 6;         // 请求方法
  string path = 7;          // 请求路径
  string ip = 8;            // 请求IP
  string address = 9;       // IP地址
  string description = 10;  // 请求描述
  string req_headers = 11;  // 请求头
  string req_body = 12;     // 请求体
  string resp_headers = 13;  // 响应头
  string resp_body = 14;    // 响应体
  uint32 status = 15;        // 状态
  double duration = 16;      // 耗时
  string create_time = 17;  // 创建时间戳
  UserInfo user = 18; // 用户信息
}
message GetOperationResponse{
  repeated OperationLogData items = 1;//返回数据有值无值时不省略字段
  uint64 page = 2;
  uint64 pageSize = 3;
  uint64 total = 4;
}
message DelLastOperationRequest{
}
message DelLastOperationResponse{
}
message GetOperationDetailRequest{
  uint64 id = 1;
}
message GetOperationDetailResponse{
  uint64 id = 1;              // 日志ID
  uint64 user_id = 2;        // 用户ID
  uint64 account_id = 3;     // 账号ID
  uint64 business_id = 4;     // 业务ID
  string type = 5;           // 日志类型
  string method = 6;         // 请求方法
  string path = 7;          // 请求路径
  string ip = 8;            // 请求IP
  string address = 9;       // IP地址
  string description = 10;  // 请求描述
  string req_headers = 11;  // 请求头
  string req_body = 12;     // 请求体
  string resp_headers = 13;  // 响应头
  string resp_body = 14;    // 响应体
  uint32 status = 15;        // 状态
  double duration = 16;      // 耗时
  string create_time = 17;  // 创建时间戳
  string username = 18;     // 操作员
}
// 定义服务
service LogService {
  rpc GetLogin(GetLogListRequest) returns (GetLogListResponse);
  rpc DelLastLogin(DelLastLoginRequest) returns (DelLastLoginResponse);
  rpc GetOperation(GetOperationRequest) returns (GetOperationResponse);
  rpc DelLastOperation(DelLastOperationRequest) returns (DelLastOperationResponse);
  rpc GetOperationDetail(GetOperationDetailRequest) returns (GetOperationDetailResponse);
}


