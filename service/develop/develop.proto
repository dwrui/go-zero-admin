// 声明 proto 使用的语法版本
syntax = "proto3";

// proto 包名
package develop;

// golang 包名
option go_package = "./develop";


message GetListRequest {
  string name = 1;
  string status = 2;
  string create_time = 3;
  uint64 page = 4;
  uint64 page_size = 5;
}
message DevelopListData{
  string api_filename = 1;      // API文件名
  string api_path = 2;          // API路径
  uint64 auto_increment = 3;    // 自增ID
  string cate_tablename = 4;     // 分类表名
  string codelocation = 5;       // 代码位置
  string collation = 6;          // 字符集
  string comment = 7;            // 表注释
  string component = 8;          // 前端组件
  string create_time = 9;         // 创建时间
  string engine = 10;            // 数据库引擎
  string fields = 11;            // 字段列表
  uint64 fromtype = 12;          // 来源类型
  string godir = 13;             // Go目录
  string icon = 14;              // 图标
  uint64 id = 15;                // ID
  uint64 is_install = 16;        // 是否安装
  uint64 pid = 17;               // 父ID
  string routename = 18;         // 路由名称
  string routepath = 19;         // 路由路径
  uint64 rule_id = 20;           // 规则ID
  string rule_name = 21;         // 规则名称
  uint64 status = 22;            // 状态
  uint64 table_rows = 23;        // 表行数
  string tablename = 24;         // 表名
  string tpl_type = 25;          // 模板类型
  string update_time = 26;        // 更新时间
}
message GetDevelopListResponse {
  repeated DevelopListData data = 1;
  uint64 total = 2;
  uint64 page = 3;
  uint64 page_size = 4;
}

message GetDevelopContentRequest {
  uint64 id = 1;
}
message DevelopContentData{
  string api_filename = 1;      // API文件名
  string api_path = 2;          // API路径
  string cate_tablename = 3;     // 分类表名
  string codelocation = 4;       // 代码位置
  string comment = 5;            // 表注释
  string component = 6;          // 前端组件
  string icon = 7;               // 图标
  uint64 id = 8;                 // ID
  uint64 is_install = 9;         // 是否安装
  uint64 pid = 10;               // 父ID
  string routename = 11;         // 路由名称
  string routepath = 12;         // 路由路径
  uint64 rule_id = 13;           // 规则ID
  string rule_name = 14;         // 规则名称
  string tablename = 15;         // 表名
  string tpl_type = 16;          // 模板类型
}
message DevelopContentList{
  string align = 1;         // 对齐方式
  string field = 2;         // 字段名
  uint64 id = 3;            // 字段ID
  bool islist = 4;          // 是否在列表中显示
  bool isorder = 5;         // 是否可排序
  uint64 list_weigh = 6;    // 列表排序权重
  string name = 7;          // 字段显示名称
  string show_ui = 8;       // 显示UI
  uint64 width = 9;         // 宽度
}
message DevelopContentSearchList{
  uint64 id = 1;            // 字段ID
  bool issearch = 2;        // 是否可搜索
  string name = 3;          // 字段名称
  uint64 search_weigh = 4;  // 搜索权重
  string searchtype = 5;    // 搜索类型
  string searchway = 6;     // 搜索方式
  uint64 searchwidth = 7;   // 搜索宽度
}
message DevelopFieldList{
  uint64 id = 1;
  bool isform = 2;          // 是否在列表中显示
  string datatable = 3;     // 数据库表名
  string datatablename = 4;   // 数据库表名
  string field = 5;      // 字段ID
  uint64 dic_group_id = 6;      // 字典分组ID
  uint64 field_weigh = 7;      // 字段ID
  string formtype = 8;      // 字段ID
  uint64 gridwidth = 9;      // 字段ID
  string name = 10;      // 字段ID
  bool required = 11;      // 字段ID
}
message GetDevelopContentResponse {
  DevelopContentData  data = 1;
  bool haseadmin = 2;
  repeated DevelopFieldList field_list = 3;
  repeated  DevelopContentList list = 4;
  repeated  DevelopContentSearchList search_list = 5;
}
message GetDevelopMenuParentRequest {
  string codelocation = 1;
}

message DevelopMenuParentList{
  repeated DevelopMenuParentList children = 1;  // 子菜单
  uint64 id = 2;                               // 菜单ID
  string locale = 3;                           // 本地化键
  uint64 pid = 4;                              // 父菜单ID
  string routepath = 5;                        // 路由路径
  string title = 6;                            // 菜单标题
}
message GetDevelopMenuParentResponse {
  repeated uint64 ids = 1;
  repeated DevelopMenuParentList list = 2;
}
message GetTableListRequest {
}
message TableListData{
  string name = 1;               // 表名
  string title = 2;          // 表标题
}
message GetTableListResponse {
  repeated TableListData data = 1;
}
message CheckedHaseTableRequest {
  repeated  string tablenames = 1;
}
message CheckedHaseTableResponse {
}
message UpCodeTableRequest {
  repeated  string tablenames = 1;
}
message UpCodeTableResponse {
}
message GetGoVueDirRequest {
  string codelocation = 1;
}
message GetGoVueDirResponse {
  repeated string go_app_dir = 1;
  repeated string go_file_dir = 2;
  bool is_install = 3;
  repeated string views_dir = 4;
}
message UpStatusRequest {
  uint64 id = 1;
  uint64 status = 2;
}
message UpStatusResponse {}
message DelRequest {
  uint64 id = 1;
  uint64  is_install = 2;
}
message DelResponse {}
message DelTplCodeRequest {
  uint64 id = 1;
}
message DelTplCodeResponse {}
message UninstallCodeRequest {
  string id = 1;
}
message UninstallCodeResponse {}
message GetDbfieldRequest {
  string tablename = 1;
}
message GetDbFieldData{
  string label = 1;
  string type = 2;
  string value = 3;
}
message GetDbfieldResponse {
  repeated GetDbFieldData list = 1;
}
message MarkTplCodeRequest {
  uint64 id = 1;
}
message MarkTplCodeResponse {}

// 定义服务
service DevelopService {
  rpc GetList(GetListRequest) returns (GetDevelopListResponse);
  rpc GetContent(GetDevelopContentRequest) returns (GetDevelopContentResponse);
  rpc UpStatus(UpStatusRequest) returns (UpStatusResponse);
  rpc Del(DelRequest) returns (DelResponse);
  rpc DelTplCode(DelTplCodeRequest) returns (DelTplCodeResponse);
  rpc UninstallCode(UninstallCodeRequest) returns (UninstallCodeResponse);
  rpc GetDbField(GetDbfieldRequest) returns (GetDbfieldResponse);
  rpc GetMenuParent(GetDevelopMenuParentRequest) returns (GetDevelopMenuParentResponse);
  rpc GetTableList(GetTableListRequest) returns (GetTableListResponse);
  rpc CheckedHaseTable(CheckedHaseTableRequest) returns (CheckedHaseTableResponse);
  rpc UpCodeTable(UpCodeTableRequest) returns (UpCodeTableResponse);
  rpc GetGoVueDir(GetGoVueDirRequest) returns (GetGoVueDirResponse);
  rpc MarkTplCode(MarkTplCodeRequest) returns (MarkTplCodeResponse);
}